name: Gazelle Second Seat Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Stock and Send Report
        run: |
          set +e  # 👈 Отключаем выход по ошибке (важно!)
          
          # Читаем счетчик
          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi
          COUNT=$((COUNT + 1))
          echo "🔢 Проверка №$COUNT"
          
          # Проверяем сайт
          echo "🔍 Скачиваем страницу fromrebel.com..."
          RESPONSE=$(curl -s "https://fromrebel.com/search?q=Gazelle+second+seat" -H "User-Agent: Mozilla/5.0" || echo "ERROR")
          
          if [ "$RESPONSE" = "ERROR" ] || [ -z "$RESPONSE" ]; then
            echo "⚠️ Не удалось получить страницу сайта"
            FOUND=false
          else
            echo "📄 Страница получена (${#RESPONSE} символов)"
            # Проверяем наличие товара
            if echo "$RESPONSE" | grep -qi "second seat" && echo "$RESPONSE" | grep -q "Add to Cart" && ! echo "$RESPONSE" | grep -q "Sold Out"; then
              FOUND=true
              echo "✅ Товар найден!"
            else
              FOUND=false
              echo "❌ Товар не найден"
            fi
          fi
          
          # Время для отчета (Торонто = UTC-4)
          CURRENT_HOUR_UTC=$(date -u +%H)
          CURRENT_MIN_UTC=$(date -u +%M)
          echo "⏰ UTC: ${CURRENT_HOUR_UTC}:${CURRENT_MIN_UTC}"
          
          IS_REPORT_TIME=false
          if [ "$CURRENT_MIN_UTC" -lt 30 ]; then
             if [ "$CURRENT_HOUR_UTC" -eq 12 ] || [ "$CURRENT_HOUR_UTC" -eq 21 ]; then
                IS_REPORT_TIME=true
                echo "📊 Время отчета (8:00 или 17:00 Торонто)"
             fi
          fi
          
          TELEGRAM_MSG=""
          
          if [ "$FOUND" = true ]; then
            TELEGRAM_MSG="🚨 <b>GAZELLE SECOND SEAT В НАЛИЧИИ!</b>%0A%0A🔗 https://fromrebel.com/search?q=Gazelle+second+seat%0A⏰ $(date)"
            NEW_COUNT=0
          elif [ "$IS_REPORT_TIME" = true ]; then
            TELEGRAM_MSG="📊 <b>Отчет о поиске</b>%0A🔍 Проверок с последнего сообщения: <b>$COUNT</b>%0A📅 Время: $(date)"
            NEW_COUNT=0
          else
            NEW_COUNT=$COUNT
          fi
          
          # Сохраняем счетчик
          echo "$NEW_COUNT" > counter.txt
          echo "💾 Счетчик: $NEW_COUNT"
          
          # Отправляем в Telegram
          if [ -n "$TELEGRAM_MSG" ]; then
            echo "📱 Отправка в Telegram..."
            curl -v -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=$TELEGRAM_MSG" \
              -d "parse_mode=HTML" 2>&1 | tee /tmp/tg_response.txt
            echo "📡 Ответ Telegram см. выше"
          else
            echo "🔇 Сообщение не отправлено (нет повода)"
          fi
          
          echo "🏁 Завершено"

      - name: Upload counter
        uses: actions/upload-artifact@v4
        with:
          name: counter
          path: counter.txt
          retention-days: 90
          overwrite: true

      - name: Download counter
        uses: actions/download-artifact@v4
        with:
          name: counter
          path: .
        continue-on-error: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
