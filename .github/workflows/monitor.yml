name: Gazelle Second Seat Monitor

on:
    workflow_dispatch:

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TZ: America/Toronto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check stock and send Telegram
        shell: bash
        run: |
          set +e

          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi

          COUNT=$((COUNT + 1))
          echo "🔢 Проверка №$COUNT"

          URL="https://fromrebel.com/search?q=Gazelle+second+seat"
          echo "🔍 Проверяем: $URL"

          RESPONSE=$(curl -sL "$URL" -H "User-Agent: Mozilla/5.0" || echo "ERROR")

          if [ "$RESPONSE" = "ERROR" ] || [ -z "$RESPONSE" ]; then
            echo "⚠️ Не удалось получить страницу сайта"
            FOUND=false
          else
            echo "📄 Страница получена (${#RESPONSE} символов)"

            if echo "$RESPONSE" | grep -qi "second seat"; then
              FOUND=true
              echo "✅ Товар найден"
            else
              FOUND=false
              echo "❌ Товар не найден"
            fi
          fi

          CURRENT_HOUR=$(date +%H)
          CURRENT_MIN=$(date +%M)
          CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')

          echo "⏰ Toronto time: $CURRENT_TIME"

          IS_REPORT_TIME=false
          if [ "$CURRENT_HOUR" = "08" ] && [ "$CURRENT_MIN" = "30" ]; then
            IS_REPORT_TIME=true
            echo "📊 Время утреннего отчета"
          fi

          if [ "$CURRENT_HOUR" = "18" ] && [ "$CURRENT_MIN" = "30" ]; then
            IS_REPORT_TIME=true
            echo "📊 Время вечернего отчета"
          fi

          TELEGRAM_MSG=""
          NEW_COUNT=$COUNT

          if [ "$FOUND" = true ]; then
            TELEGRAM_MSG="🚨 <b>GAZELLE SECOND SEAT В НАЛИЧИИ!</b>%0A%0A🔗 $URL%0A📅 $CURRENT_TIME"
            NEW_COUNT=0
          elif [ "$IS_REPORT_TIME" = true ]; then
            TELEGRAM_MSG="📊 <b>Отчет о поиске</b>%0A🔍 Проверок с последнего сообщения: <b>$COUNT</b>%0A📅 $CURRENT_TIME"
            NEW_COUNT=0
          fi

          echo "$NEW_COUNT" > counter.txt
          echo "💾 Счетчик сохранен: $NEW_COUNT"

          if [ -n "$TELEGRAM_MSG" ]; then
            echo "📱 Отправка сообщения в Telegram..."

            TG_RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TG_CHAT_ID" \
              -d "text=$TELEGRAM_MSG" \
              -d "parse_mode=HTML")

            echo "$TG_RESPONSE"

            if echo "$TG_RESPONSE" | grep -q '"ok":true'; then
              echo "✅ Telegram сообщение успешно отправлено"
            else
              echo "❌ Ошибка отправки в Telegram"
            fi
          else
            echo "🔇 Сообщение не отправлено — нет повода"
          fi

      - name: Commit updated counter
        shell: bash
        run: |
          if git diff --quiet counter.txt; then
            echo "Нет изменений в counter.txt"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.txt
          git commit -m "Update counter"
          git push
