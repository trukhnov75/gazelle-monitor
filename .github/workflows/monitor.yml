name: Gazelle Second Seat Monitor

on:
  schedule:
    - cron: '27,57 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Stock and Send Report
        shell: bash
        run: |
          set +e

          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi

          COUNT=$((COUNT + 1))
          echo "Проверка №$COUNT"

          echo "Скачиваем страницу fromrebel.com..."
          RESPONSE=$(curl -sL "https://fromrebel.com/search?q=Gazelle+second+seat" -H "User-Agent: Mozilla/5.0" || echo "ERROR")

          if [ "$RESPONSE" = "ERROR" ] || [ -z "$RESPONSE" ]; then
            echo "Не удалось получить страницу сайта"
            FOUND=false
          else
            echo "Страница получена (${#RESPONSE} символов)"
            if echo "$RESPONSE" | grep -qi "second seat" && \
               echo "$RESPONSE" | grep -q "Add to Cart" && \
               ! echo "$RESPONSE" | grep -q "Sold Out"; then
              FOUND=true
              echo "Товар найден"
            else
              FOUND=false
              echo "Товар не найден"
            fi
          fi

          CURRENT_HOUR_UTC=$(date -u +%H)
          CURRENT_MIN_UTC=$(date -u +%M)

          IS_REPORT_TIME=false
          if [ "$CURRENT_MIN_UTC" -ge 27 ] && [ "$CURRENT_MIN_UTC" -lt 30 ]; then
            if [ "$CURRENT_HOUR_UTC" -eq 12 ] || [ "$CURRENT_HOUR_UTC" -eq 21 ]; then
              IS_REPORT_TIME=true
            fi
          fi

          TELEGRAM_MSG=""

          if [ "$FOUND" = true ]; then
            TELEGRAM_MSG="🚨 <b>GAZELLE SECOND SEAT В НАЛИЧИИ!</b>%0A%0A🔗 https://fromrebel.com/search?q=Gazelle+second+seat%0A⏰ $(date)"
            NEW_COUNT=0
          elif [ "$IS_REPORT_TIME" = true ]; then
            TELEGRAM_MSG="📊 <b>Отчет о поиске</b>%0A🔍 Проверок с последнего сообщения: <b>$COUNT</b>%0A📅 Время: $(date)"
            NEW_COUNT=0
          else
            NEW_COUNT=$COUNT
          fi

          echo "$NEW_COUNT" > counter.txt

          if [ -n "$TELEGRAM_MSG" ]; then
            curl -sS -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TG_CHAT_ID" \
              -d "text=$TELEGRAM_MSG" \
              -d "parse_mode=HTML"
          else
            echo "Сообщение не отправлено"
          fi
