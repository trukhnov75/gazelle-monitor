name: Gazelle Second Seat Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  telegram-test:
    runs-on: ubuntu-latest

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TZ: America/Toronto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare counter
        shell: bash
        run: |
          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi

          COUNT=$((COUNT + 1))
          echo "$COUNT" > counter.txt
          echo "COUNT=$COUNT" >> $GITHUB_ENV

      - name: Send test message to Telegram
        shell: bash
        run: |
          MSG="🧪 <b>ТЕСТ TELEGRAM ИЗ GITHUB ACTIONS</b>%0A%0A✅ Если ты видишь это сообщение, значит бот работает%0A🔢 Счетчик: $COUNT%0A📅 Время Toronto: $(date '+%Y-%m-%d %H:%M:%S')"

          curl -sS -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "text=$MSG" \
            -d "parse_mode=HTML"

      - name: Commit updated counter
        shell: bash
        run: |
          if git diff --quiet counter.txt; then
            echo "Нет изменений в counter.txt"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.txt
          git commit -m "Test telegram counter update"
          git push
