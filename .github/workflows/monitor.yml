name: Gazelle Second Seat Monitor

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка наличия
        run: |
          RESPONSE=$(curl -s "https://fromrebel.com/search?q=Gazelle+second+seat" -H "User-Agent: Mozilla/5.0")
          
          if echo "$RESPONSE" | grep -i "second seat" | grep -q "Add to Cart" && ! echo "$RESPONSE" | grep -i "second seat" | grep -q "Sold Out"; then
            echo "✅ ТОВАР НАЙДЕН!"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=🚨 GAZELLE SECOND SEAT В НАЛИЧИИ!%0A%0A🔗 https://fromrebel.com/search?q=Gazelle+second+seat%0A⏰ $(date)" \
              -d "parse_mode=HTML"
          else
            echo "❌ Пока нет в наличии. Проверено: $(date)"
          fi

env:
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
