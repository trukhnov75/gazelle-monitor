name: Gazelle Second Seat Monitor

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Stock and Send Report
        run: |
          # Читаем счетчик из артефакта или создаем новый
          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi
          
          # Увеличиваем счетчик
          COUNT=$((COUNT + 1))
          echo "Проверка №$COUNT"
          
          # Проверяем сайт
          RESPONSE=$(curl -s "https://fromrebel.com/search?q=Gazelle+second+seat" -H "User-Agent: Mozilla/5.0")
          
          FOUND=false
          if echo "$RESPONSE" | grep -i "second seat" | grep -q "Add to Cart" && ! echo "$RESPONSE" | grep -i "second seat" | grep -q "Sold Out"; then
            FOUND=true
          fi
          
          # Определяем время (Торонто = UTC-4 летом)
          CURRENT_HOUR_UTC=$(date -u +%H)
          CURRENT_MIN_UTC=$(date -u +%M)
          
          IS_REPORT_TIME=false
          if [ "$CURRENT_MIN_UTC" -lt 30 ]; then
             if [ "$CURRENT_HOUR_UTC" -eq 12 ] || [ "$CURRENT_HOUR_UTC" -eq 21 ]; then
                IS_REPORT_TIME=true
             fi
          fi
          
          TELEGRAM_MSG=""
          
          if [ "$FOUND" = true ]; then
            TELEGRAM_MSG="🚨 <b>GAZELLE SECOND SEAT В НАЛИЧИИ!</b>%0A%0A🔗 https://fromrebel.com/search?q=Gazelle+second+seat%0A⏰ $(date)"
            NEW_COUNT=0
          elif [ "$IS_REPORT_TIME" = true ]; then
            TELEGRAM_MSG="📊 <b>Отчет о поиске</b>%0A🔍 Проверок с последнего сообщения: <b>$COUNT</b>%0A📅 Время: $(date)"
            NEW_COUNT=0
          else
            NEW_COUNT=$COUNT
          fi
          
          # Сохраняем новый счетчик
          echo "$NEW_COUNT" > counter.txt
          
          # Отправляем в Telegram если есть сообщение
          if [ -n "$TELEGRAM_MSG" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=$TELEGRAM_MSG" \
              -d "parse_mode=HTML"
          fi
          
          echo "COUNTER=$NEW_COUNT" >> $GITHUB_ENV

      - name: Upload counter
        uses: actions/upload-artifact@v4
        with:
          name: counter
          path: counter.txt
          retention-days: 90
          overwrite: true

      - name: Download counter
        uses: actions/download-artifact@v4
        with:
          name: counter
          path: .
        continue-on-error: true

env:
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
