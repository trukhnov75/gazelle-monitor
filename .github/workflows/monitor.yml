name: Gazelle Second Seat Monitor

on:
  schedule:
    - cron: '27,57 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TZ: America/Toronto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Stock and Send Report
        shell: bash
        run: |
          set +e

          if [ -f counter.txt ]; then
            COUNT=$(cat counter.txt)
          else
            COUNT=0
          fi

          COUNT=$((COUNT + 1))
          echo "🔢 Проверка №$COUNT"

          echo "🔍 Скачиваем страницу fromrebel.com..."
          RESPONSE=$(curl -sL "https://fromrebel.com/search?q=Gazelle+second+seat" \
            -H "User-Agent: Mozilla/5.0" || echo "ERROR")

          if [ "$RESPONSE" = "ERROR" ] || [ -z "$RESPONSE" ]; then
            echo "⚠️ Не удалось получить страницу сайта"
            FOUND=false
          else
            echo "📄 Страница получена (${#RESPONSE} символов)"
            if echo "$RESPONSE" | grep -qi "second seat" && \
               echo "$RESPONSE" | grep -q "Add to Cart" && \
               ! echo "$RESPONSE" | grep -q "Sold Out"; then
              FOUND=true
              echo "✅ Товар найден!"
            else
              FOUND=false
              echo "❌ Товар не найден"
            fi
          fi

          CURRENT_HOUR=$(date +%H)
          CURRENT_MIN=$(date +%M)
          echo "⏰ Toronto time: ${CURRENT_HOUR}:${CURRENT_MIN}"

          IS_REPORT_TIME=false
if [ "$CURRENT_HOUR" = "08" ] && [ "$CURRENT_MIN" = "27" ]; then
  IS_REPORT_TIME=true
  echo "📊 Утренний отчет"
fi

if [ "$CURRENT_HOUR" = "17" ] && [ "$CURRENT_MIN" = "27" ]; then
  IS_REPORT_TIME=true
  echo "📊 Вечерний отчет"
fi

TELEGRAM_MSG="🧪 <b>ТЕСТ TELEGRAM ИЗ GITHUB ACTIONS</b>%0A📅 Время: $(date)%0A🔢 COUNT=$COUNT%0A✅ Если ты видишь это сообщение, значит бот и chat_id работают"
NEW_COUNT=$COUNT
          echo "$NEW_COUNT" > counter.txt
          echo "💾 Счетчик сохранен: $NEW_COUNT"

          if [ -n "$TELEGRAM_MSG" ]; then
            echo "📱 Отправка в Telegram..."
            curl -sS -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TG_CHAT_ID" \
              -d "text=$TELEGRAM_MSG" \
              -d "parse_mode=HTML"
          else
            echo "🔇 Сообщение не отправлено"
          fi

      - name: Commit updated counter
        shell: bash
        run: |
          if git diff --quiet counter.txt; then
            echo "Нет изменений в counter.txt"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add counter.txt
          git commit -m "Update counter [skip ci]"
          git push
